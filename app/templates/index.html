<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Archive Drive</title>
</head>
<body>

  <h1>Archive Drive ✅</h1>

  <form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="file" required />
    <button type="submit">Upload</button>
  </form>

  <h2>Files</h2>
  <ul>
    {% for file in files %}
      <li>{{ file }}</li>
    {% else %}
      <li>No files uploaded yet</li>
    {% endfor %}
  </ul>

</body>
</html>
